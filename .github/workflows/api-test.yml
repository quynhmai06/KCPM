name: Payment Contract Newman Test

on:
  push:
    branches: [main, develop]
    paths:
      - "payment-service/**"
      - "postman/paymentservice/**"
      - "scripts/**"
      - "docker-compose.yml"
      - ".github/workflows/api-test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "payment-service/**"
      - "postman/paymentservice/**"
      - "scripts/**"
      - "docker-compose.yml"
      - ".github/workflows/api-test.yml"
  workflow_dispatch:

jobs:
  payment-contract:
    name: Payment Contract Test
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: supersecret

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create CI environment file
        run: |
          cat > .env <<EOF
          JWT_SECRET=${JWT_SECRET}
          FLASK_SECRET=ci-flask-secret
          GATEWAY_SECRET=ci-gateway-secret
          SHARED_DATABASE_URL=postgresql+psycopg2://ev:evpass@postgres:5432/evdb
          PROVIDER=mock
          EOF

      - name: Start payment service
        run: |
          docker compose down -v --remove-orphans
          docker compose up -d --build postgres payment_service

      - name: Wait for payment service
        run: |
          set -euo pipefail

          for i in {1..60}; do
            if curl -fsS http://localhost:5008/payment/health >/dev/null 2>&1; then
              echo "payment_service is ready"
              exit 0
            fi
            sleep 2
          done

          docker compose ps
          docker compose logs --no-color payment_service || true
          exit 1

      - name: Make member JWT token
        run: |
          MEMBER_TOKEN="$(node -e '
            const crypto = require("crypto");
            const secret = process.env.JWT_SECRET || "supersecret";
            const b64url = (value) => Buffer.from(JSON.stringify(value)).toString("base64url");
            const now = Math.floor(Date.now() / 1000);
            const header = { alg: "HS256", typ: "JWT" };
            const payload = {
              sub: "1",
              username: "contract_member_test",
              role: "member",
              approved: true,
              locked: false,
              iat: now,
              exp: now + 31536000
            };
            const unsigned = `${b64url(header)}.${b64url(payload)}`;
            const signature = crypto.createHmac("sha256", secret).update(unsigned).digest("base64url");
            console.log(`${unsigned}.${signature}`);
          ')"

          echo "MEMBER_TOKEN=$MEMBER_TOKEN" >> "$GITHUB_ENV"

      - name: Run payment contract Newman
        id: newman
        run: |
          set +e
          rm -rf reports
          mkdir -p reports

          newman run postman/paymentservice/paymentservice_postman_collection.json \
            -e postman/postman_environment.json \
            -d postman/paymentservice/data_contract_management.json \
            --folder PAYMENT_CONTRACT_MANAGEMENT \
            --env-var payment_url=http://localhost:5008 \
            --env-var memberToken="${MEMBER_TOKEN}" \
            --reporters cli,json,htmlextra \
            --reporter-json-export reports/paymentservice-contract-newman-result.json \
            --reporter-htmlextra-export reports/paymentservice-contract-report.html

          CODE=$?

          if [ "$CODE" -ne 0 ]; then
            echo "failed=1" >> "$GITHUB_OUTPUT"
          else
            echo "failed=0" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Collect Docker logs when failed
        if: steps.newman.outputs.failed == '1'
        run: docker compose logs --no-color > reports/docker-compose-logs.txt

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-contract-report
          path: reports/

      - name: Create Jira bug when Contract test failed
        if: steps.newman.outputs.failed == '1'
        run: |
          set -euo pipefail
          echo "Creating Jira bug(s) for paymentservice-contract"
          NEWMAN_SERVICE=paymentservice-contract bash scripts/create-jira-issue.sh
          exit 1
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}

      - name: Stop services
        if: always()
        run: docker compose down -v --remove-orphans