name: API Automation Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      jira_issue_key:
        description: Jira issue key to transition after successful tests, for example KTPM-1
        required: false
        type: string

jobs:
  api-test:
    name: Auth Service Profile Newman Test
    runs-on: ubuntu-latest
    env:
      AUTH_URL: http://localhost:5001
      JWT_SECRET: supersecret
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      PROFILE_PASSWORD: "12345678"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API test tools
        run: npm install -g newman newman-reporter-htmlextra wait-on

      - name: Create CI environment file
        run: |
          cat > .env <<EOF
          JWT_SECRET=${JWT_SECRET}
          GATEWAY_SECRET=ci_gateway_secret
          ADMIN_USERNAME=${ADMIN_USERNAME}
          ADMIN_EMAIL=${ADMIN_EMAIL}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          PROVIDER=none
          GOOGLE_API_KEY=
          GEMINI_MODEL=models/gemini-2.5-flash
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4o-mini
          SOFT_TIMEOUT=8
          HARD_TIMEOUT=15
          CACHE_TTL=600
          STRICT_AI=0
          BANK_NAME=Test Bank
          BANK_ACCOUNT=0000000000
          BANK_OWNER=CI Test
          EOF

      - name: Build and start auth service
        run: docker compose up --build -d auth_service

      - name: Wait for auth health check
        run: wait-on "$AUTH_URL/health" --timeout 180000 --interval 3000

      - name: Seed auth admin user
        run: docker compose exec -T auth_service python init_db.py

      - name: Prepare approved member token for profile
        run: |
          ts="$(date +%s)"
          suffix="${ts: -8}"
          username="profile_member_${ts}"
          email="${username}@example.com"
          phone="07${suffix}"

          admin_token="$(curl -fsS -X POST "$AUTH_URL/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$ADMIN_USERNAME\",\"password\":\"$ADMIN_PASSWORD\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")"

          user_response="$(curl -fsS -X POST "$AUTH_URL/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${username}\",\"email\":\"${email}\",\"password\":\"$PROFILE_PASSWORD\",\"phone\":\"${phone}\"}")"

          user_id="$(printf '%s' "$user_response" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")"

          curl -fsS -X PATCH "$AUTH_URL/auth/users/${user_id}/status" \
            -H "Authorization: Bearer ${admin_token}" \
            -H "Content-Type: application/json" \
            -d '{"status":"approved"}'

          member_token="$(curl -fsS -X POST "$AUTH_URL/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${username}\",\"password\":\"$PROFILE_PASSWORD\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")"

          echo "AUTH_MEMBER_TOKEN=${member_token}" >> "$GITHUB_ENV"

      - name: Show running containers
        run: docker compose ps

      - name: Run auth profile Newman collection
        id: newman
        run: |
          rm -rf reports
          mkdir -p reports

          newman run "postman/authservice/authservice_postman_collection.json" \
            -e "postman/postman_environment.json" \
            -d "postman/authservice/data_profile.json" \
            --folder Profile \
            --env-var auth_url="$AUTH_URL" \
            --env-var memberToken="$AUTH_MEMBER_TOKEN" \
            --reporters cli,junit,json,htmlextra \
            --reporter-junit-export "reports/authservice-profile-newman-result.xml" \
            --reporter-json-export "reports/authservice-profile-newman-result.json" \
            --reporter-htmlextra-export "reports/authservice-profile-newman-report.html"

          cp reports/authservice-profile-newman-result.json reports/newman-result.json

      - name: Collect Docker logs when failed
        if: failure()
        run: |
          mkdir -p reports
          docker compose ps > reports/docker-compose-ps.txt
          docker compose logs --no-color > reports/docker-compose.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/

      - name: Create Jira bug when test failed
        if: failure()
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}
          NEWMAN_SERVICE: authservice-profile

      - name: Stop backend services
        if: always()
        run: docker compose down
