name: API Automation Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      jira_issue_key:
        description: Jira issue key to transition after successful tests, for example KTPM-1
        required: false
        type: string

jobs:
  api-test:
    name: Build backend and run Postman tests
    runs-on: ubuntu-latest
    env:
      GATEWAY_URL: http://localhost:8000
      AUTH_URL: http://localhost:5001
      LISTING_URL: http://localhost:5002
      ADMIN_URL: http://localhost:5003
      FAVORITES_URL: http://localhost:5004
      PAYMENT_URL: http://localhost:5008
      PRICING_URL: http://localhost:5009
      SEARCH_URL: http://localhost:5010
      REVIEWS_URL: http://localhost:5011
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      TEST_PASSWORD: "123456"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API test tools
        run: npm install -g newman newman-reporter-htmlextra wait-on

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          JWT_SECRET=ci_jwt_secret
          GATEWAY_SECRET=ci_gateway_secret
          ADMIN_USERNAME=admin
          ADMIN_EMAIL=admin@example.com
          ADMIN_PASSWORD=admin123
          AUTH_URL_INTERNAL=http://auth_service:5001
          ADMIN_URL_INTERNAL=http://admin_service:5003
          LISTING_URL=http://listing_service:5002
          SEARCH_URL=http://search_service:5003
          PRICING_URL=http://pricing_service:5003
          FAVORITES_URL=http://favorites_service:5004
          PAYMENT_URL=http://payment_service:5003
          PROVIDER=none
          GOOGLE_API_KEY=
          GEMINI_MODEL=models/gemini-2.5-flash
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4o-mini
          SOFT_TIMEOUT=8
          HARD_TIMEOUT=15
          CACHE_TTL=600
          STRICT_AI=0
          BANK_NAME=Test Bank
          BANK_ACCOUNT=0000000000
          BANK_OWNER=CI Test
          EOF

      - name: Build and start backend services
        run: docker compose up --build -d

      - name: Wait for backend health checks
        run: |
          wait-on \
            "$GATEWAY_URL/health" \
            "$AUTH_URL/health" \
            "$LISTING_URL/" \
            "$ADMIN_URL/health" \
            "$FAVORITES_URL/favorites/" \
            "$PAYMENT_URL/payment/health" \
            "$PRICING_URL/" \
            "$SEARCH_URL/search/" \
            "$REVIEWS_URL/" \
            --timeout 180000 \
            --interval 3000

      - name: Seed auth admin user
        run: docker compose exec -T auth_service python init_db.py

      - name: Show running containers
        run: docker compose ps

      - name: Run shared Postman API tests with Newman
        id: newman
        run: |
          mkdir -p reports
          newman run postman/authservice_postman_collection.json \
            -e postman/postman_environment.json \
            --env-var auth_url="$AUTH_URL" \
            --env-var adminUsername="$ADMIN_USERNAME" \
            --env-var adminEmail="$ADMIN_EMAIL" \
            --env-var adminPassword="$ADMIN_PASSWORD" \
            --env-var testPassword="$TEST_PASSWORD" \
            --reporters cli,junit,json,htmlextra \
            --reporter-junit-export reports/newman-result.xml \
            --reporter-json-export reports/newman-result.json \
            --reporter-htmlextra-export reports/newman-report.html

      - name: Collect Docker logs when failed
        if: failure()
        run: |
          mkdir -p reports
          docker compose ps > reports/docker-compose-ps.txt
          docker compose logs --no-color > reports/docker-compose.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/

      - name: Create Jira bug when test failed
        if: failure()
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}

      - name: Stop backend services
        if: always()
        run: docker compose down
