name: Auth White-box Test

on:
  push:
    branches: [main, develop]
    paths:
      - "auth-service/**"
      - "scripts/**"
      - ".github/workflows/api-test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "auth-service/**"
      - "scripts/**"
      - ".github/workflows/api-test.yml"
  workflow_dispatch:

jobs:
  auth-whitebox:
    name: Auth White-box Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: auth-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Run white-box tests
        id: pytest
        working-directory: auth-service
        run: |
          mkdir -p ../reports

          set +e
          python -m pytest tests/test_auth_whitebox.py -v \
            --junitxml=../reports/auth-whitebox-junit.xml \
            --cov=routes \
            --cov=models \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:../reports/auth-whitebox-coverage.xml

          pytest_exit=$?
          echo "pytest_exit=$pytest_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Convert pytest result for Jira
        if: steps.pytest.outputs.pytest_exit != '0'
        run: |
          python scripts/pytest-junit-to-newman.py \
            --junit reports/auth-whitebox-junit.xml \
            --output reports/auth-whitebox-newman-result.json \
            --service auth-whitebox

      - name: Create Jira bug when white-box failed
        if: steps.pytest.outputs.pytest_exit != '0'
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}
          NEWMAN_SERVICE: auth-whitebox

      - name: Upload white-box reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-whitebox-test-report
          path: reports/

      - name: Mark workflow failed when white-box failed
        if: steps.pytest.outputs.pytest_exit != '0'
        run: |
          echo "Auth white-box tests failed. Jira bug was created. Marking workflow as failed."
          exit 1