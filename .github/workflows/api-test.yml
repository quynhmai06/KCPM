name: API Automation Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      jira_issue_key:
        description: Jira issue key to transition after successful tests, for example KTPM-1
        required: false
        type: string

jobs:
  api-test:
    name: Search Service Advanced Filter Newman Test
    runs-on: ubuntu-latest
    env:
      SEARCH_URL: http://localhost:5010

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API test tools
        run: npm install -g newman newman-reporter-htmlextra wait-on

      - name: Create CI environment file
        run: |
          cat > .env <<EOF
          JWT_SECRET=supersecret
          GATEWAY_SECRET=ci_gateway_secret
          ADMIN_USERNAME=admin
          ADMIN_EMAIL=admin@example.com
          ADMIN_PASSWORD=admin123
          PROVIDER=none
          GOOGLE_API_KEY=
          GEMINI_MODEL=models/gemini-2.5-flash
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4o-mini
          SOFT_TIMEOUT=8
          HARD_TIMEOUT=15
          CACHE_TTL=600
          STRICT_AI=0
          BANK_NAME=Test Bank
          BANK_ACCOUNT=0000000000
          BANK_OWNER=CI Test
          EOF

      - name: Start postgres only
        run: docker compose up -d postgres

      - name: Build and start search service only
        run: docker compose up --build -d --no-deps search_service

      - name: Wait for search health check
        run: wait-on "$SEARCH_URL/search/" --timeout 180000 --interval 3000

      - name: Prepare search database tables
        run: |
          docker compose exec -T search_service python -c "from app import create_app; from models import db; app=create_app(); ctx=app.app_context(); ctx.push(); db.create_all()"

      - name: Show running containers
        run: docker compose ps

      - name: Run search advanced filter Newman collection
        id: newman
        run: |
          rm -rf reports
          mkdir -p reports

          newman run "postman/searchservice/searchservice_postman_collection.json" \
            -e "postman/postman_environment.json" \
            -d "postman/searchservice/data_search_adv_postman.json" \
            --folder "SEARCH_ADV" \
            --env-var search_url="$SEARCH_URL" \
            --reporters cli,junit,json,htmlextra \
            --reporter-junit-export "reports/searchservice-advanced-filter-newman-result.xml" \
            --reporter-json-export "reports/searchservice-advanced-filter-newman-result.json" \
            --reporter-htmlextra-export "reports/searchservice-advanced-filter-newman-report.html"

          cp reports/searchservice-advanced-filter-newman-result.json reports/newman-result.json

      - name: Collect Docker logs when failed
        if: failure()
        run: |
          mkdir -p reports
          docker compose ps > reports/docker-compose-ps.txt
          docker compose logs --no-color > reports/docker-compose.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/

      - name: Create Jira bug when test failed
        if: failure()
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}
          NEWMAN_SERVICE: searchservice-advanced-filter

      - name: Stop backend services
        if: always()
        run: docker compose down
