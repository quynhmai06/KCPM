name: API Automation Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      jira_issue_key:
        description: Jira issue key to transition after successful tests, for example KTPM-1
        required: false
        type: string

jobs:
  api-test:
    name: Auth Service Profile Newman Test
    runs-on: ubuntu-latest
    env:
      AUTH_URL: http://localhost:5001
      JWT_SECRET: supersecret
      PROFILE_TEST_USERNAME: newman_profile_member
      PROFILE_TEST_EMAIL: newman-profile@local.test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API test tools
        run: npm install -g newman newman-reporter-htmlextra wait-on

      - name: Create CI environment file
        run: |
          cat > .env <<EOF
          JWT_SECRET=${JWT_SECRET}
          FLASK_SECRET=ci_auth_session_secret
          AUTH_URL=http://auth_service:5001
          GATEWAY_SECRET=ci_gateway_secret
          ADMIN_USERNAME=admin
          ADMIN_EMAIL=admin@example.com
          ADMIN_PASSWORD=admin123
          PROVIDER=none
          GOOGLE_API_KEY=
          GEMINI_MODEL=models/gemini-2.5-flash
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4o-mini
          SOFT_TIMEOUT=8
          HARD_TIMEOUT=15
          CACHE_TTL=600
          STRICT_AI=0
          BANK_NAME=Test Bank
          BANK_ACCOUNT=0000000000
          BANK_OWNER=CI Test
          EOF

      - name: Start postgres
        run: docker compose up -d postgres

      - name: Build and start auth service
        run: docker compose up --build -d --no-deps auth_service

      - name: Wait for auth health check
        run: wait-on "$AUTH_URL/health" --timeout 180000 --interval 3000

      - name: Prepare profile test user and JWT token
        run: |
          MEMBER_TOKEN=$(docker compose exec -T \
            -e PROFILE_TEST_USERNAME="$PROFILE_TEST_USERNAME" \
            -e PROFILE_TEST_EMAIL="$PROFILE_TEST_EMAIL" \
            auth_service python - <<'PY'
          import os

          from app import app
          from models import db, User
          from routes import _make_token
          from werkzeug.security import generate_password_hash

          username = os.environ["PROFILE_TEST_USERNAME"]
          email = os.environ["PROFILE_TEST_EMAIL"]

          with app.app_context():
              db.create_all()
              user = User.query.filter_by(username=username).first()
              if user is None:
                  user = User(
                      username=username,
                      email=email,
                      password=generate_password_hash("ci-profile-test-password"),
                      role="member",
                  )
                  db.session.add(user)

              user.email = email
              user.phone = None
              user.approved = True
              user.locked = False
              db.session.commit()

              print(_make_token(user))
          PY
          )

          if [ -z "$MEMBER_TOKEN" ]; then
            echo "Could not create profile test token"
            exit 1
          fi

          echo "::add-mask::$MEMBER_TOKEN"
          echo "MEMBER_TOKEN=$MEMBER_TOKEN" >> "$GITHUB_ENV"

      - name: Show running containers
        run: docker compose ps

      - name: Run auth profile Newman collection
        id: newman
        run: |
          rm -rf reports
          mkdir -p reports

          newman run "postman/authservice/authservice_postman_collection.json" \
            -e "postman/postman_environment.json" \
            -d "postman/authservice/data_profile.json" \
            --folder "Profile" \
            --env-var auth_url="$AUTH_URL" \
            --env-var memberToken="$MEMBER_TOKEN" \
            --reporters cli,junit,json,htmlextra \
            --reporter-junit-export "reports/authservice-profile-newman-result.xml" \
            --reporter-json-export "reports/authservice-profile-newman-result.json" \
            --reporter-htmlextra-export "reports/authservice-profile-report.html"

          cp reports/authservice-profile-newman-result.json reports/newman-result.json

      - name: Collect Docker logs when failed
        if: failure()
        run: |
          mkdir -p reports
          docker compose ps > reports/docker-compose-ps.txt
          docker compose logs --no-color > reports/docker-compose.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authservice-profile-test-report
          path: reports/

      - name: Create Jira bug when test failed
        if: failure()
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}
          NEWMAN_SERVICE: authservice-profile

      - name: Stop backend services
        if: always()
        run: docker compose down
