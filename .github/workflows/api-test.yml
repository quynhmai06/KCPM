name: Reviews Reply API Automation Test

on:
  push:
    branches: [main, develop]
    paths:
      - "reviews-service/**"
      - "postman/reviewservice/**"
      - "postman/postman_environment.json"
      - "docker-compose.yml"
      - ".github/workflows/api-test.yml"
      - "scripts/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "reviews-service/**"
      - "postman/reviewservice/**"
      - "postman/postman_environment.json"
      - "docker-compose.yml"
      - ".github/workflows/api-test.yml"
      - "scripts/**"
  workflow_dispatch:

jobs:
  api-test:
    name: Reviews Reply Newman Test
    runs-on: ubuntu-latest
    env:
      REVIEWS_URL: http://localhost:5011
      JWT_SECRET: supersecret

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API test tools
        run: npm install -g newman newman-reporter-htmlextra wait-on

      - name: Create CI environment file
        run: |
          cat > .env <<EOF
          JWT_SECRET=${JWT_SECRET}
          DATABASE_URL=postgresql+psycopg2://ev:evpass@postgres:5432/evdb
          SHARED_DATABASE_URL=postgresql+psycopg2://ev:evpass@postgres:5432/evdb
          REVIEWS_DEV_ALLOW=1
          EOF

      - name: Start postgres only
        run: docker compose up -d postgres

      - name: Build and start reviews service only
        run: docker compose up --build -d --no-deps reviews_service

      - name: Wait for reviews health check
        run: wait-on "$REVIEWS_URL/reviews/" --timeout 180000 --interval 3000

      - name: Prepare reviews reply test data
        run: |
          docker compose exec -T reviews_service python - <<'PY'
          from app import create_app
          from db import db
          from models import Review, Reply

          app = create_app()

          with app.app_context():
              db.create_all()

              Reply.query.delete()
              Review.query.delete()

              review = Review(
                  id=1,
                  product_id=1001,
                  buyer_id=2001,
                  seller_id=2,
                  rating=5,
                  comment="CI seed review",
              )

              db.session.add(review)
              db.session.commit()

              print("Prepared review_id=1 for REVIEWS_REPLY tests")
          PY

      - name: Run reviews reply Newman collection
        id: newman
        run: |
          rm -rf reports
          mkdir -p reports

          set +e
          newman run "postman/reviewservice/reviewservice_postman_collection.json" \
            --folder "REVIEWS_REPLY" \
            -e "postman/postman_environment.json" \
            -d "postman/reviewservice/data_reply.json" \
            --env-var reviews_url="$REVIEWS_URL" \
            --env-var review_base_url="$REVIEWS_URL" \
            --env-var review_id="1" \
            --reporters cli,junit,json,htmlextra \
            --reporter-junit-export "reports/reviews-reply-newman-result.xml" \
            --reporter-json-export "reports/reviews-reply-newman-result.json" \
            --reporter-htmlextra-export "reports/reviews-reply-newman-report.html"

          newman_exit=$?
          set -e

          echo "newman_exit=$newman_exit" >> "$GITHUB_OUTPUT"

          if [ -f reports/reviews-reply-newman-result.json ]; then
            cp reports/reviews-reply-newman-result.json reports/newman-result.json
          fi

          exit 0

      - name: Collect Docker logs when Newman failed
        if: steps.newman.outputs.newman_exit != '0'
        run: |
          mkdir -p reports
          docker compose ps > reports/docker-compose-ps.txt
          docker compose logs --no-color reviews_service postgres > reports/docker-compose.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviews-reply-api-test-report
          path: reports/

      - name: Create Jira bug when Newman test failed
        if: steps.newman.outputs.newman_exit != '0'
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}
          NEWMAN_SERVICE: reviews-reply

      - name: Mark workflow failed when Newman failed
        if: steps.newman.outputs.newman_exit != '0'
        run: |
          echo "Reviews reply Newman tests failed. Jira bug was created. Marking workflow as failed."
          exit 1

      - name: Stop backend services
        if: always()
        run: docker compose down