name: White-box Test All Services

on:
  push:
    branches: [main, develop]
    paths:
      - "auth-service/**"
      - "listing-service/**"
      - "search-service/**"
      - "payment-service/**"
      - "reviews-service/**"
      - "scripts/**"
      - ".github/workflows/api-test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "auth-service/**"
      - "listing-service/**"
      - "search-service/**"
      - "payment-service/**"
      - "reviews-service/**"
      - "scripts/**"
      - ".github/workflows/api-test.yml"
  workflow_dispatch:

jobs:
  whitebox-test:
    name: White-box ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            test_file: tests/test_auth_whitebox.py
            cov_args: "--cov=routes --cov=models"

          - service: listing-service
            test_file: tests/test_listing_whitebox.py
            cov_args: "--cov=app --cov=models"

          - service: search-service
            test_file: tests/test_search_whitebox.py
            cov_args: "--cov=app --cov=models"

          - service: payment-service
            test_file: tests/test_payment_whitebox.py
            cov_args: "--cov=app --cov=models"

          - service: reviews-service
            test_file: tests/test_reviews_whitebox.py
            cov_args: "--cov=app --cov=models"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage

      - name: Run white-box tests
        id: pytest
        working-directory: ${{ matrix.service }}
        run: |
          mkdir -p ../reports

          set +e
          python -m pytest ${{ matrix.test_file }} -v \
            --junitxml=../reports/${{ matrix.service }}-junit.xml \
            ${{ matrix.cov_args }} \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:../reports/${{ matrix.service }}-coverage.xml

          pytest_exit=$?
          echo "pytest_exit=$pytest_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Convert pytest result for Jira
        if: steps.pytest.outputs.pytest_exit != '0'
        run: |
          python scripts/pytest-junit-to-newman.py \
            --junit reports/${{ matrix.service }}-junit.xml \
            --output reports/${{ matrix.service }}-newman-result.json \
            --service ${{ matrix.service }}

      - name: Create Jira bug when white-box failed
        if: steps.pytest.outputs.pytest_exit != '0'
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}
          NEWMAN_SERVICE: ${{ matrix.service }}

      - name: Upload white-box reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-whitebox-report
          path: |
            reports/${{ matrix.service }}-junit.xml
            reports/${{ matrix.service }}-coverage.xml
            reports/${{ matrix.service }}-newman-result.json

      - name: Mark workflow failed when white-box failed
        if: steps.pytest.outputs.pytest_exit != '0'
        run: |
          echo "${{ matrix.service }} white-box tests failed. Jira bug was created. Marking workflow as failed."
          exit 1