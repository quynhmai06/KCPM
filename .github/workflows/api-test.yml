name: API Automation Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  api-test:
    name: Build backend and run Postman tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API test tools
        run: npm install -g newman newman-reporter-htmlextra wait-on

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          JWT_SECRET=ci_jwt_secret
          GATEWAY_SECRET=ci_gateway_secret
          AUTH_URL_INTERNAL=http://auth_service:5001
          ADMIN_URL_INTERNAL=http://admin_service:5003
          LISTING_URL=http://listing_service:5002
          SEARCH_URL=http://search_service:5003
          PRICING_URL=http://pricing_service:5003
          FAVORITES_URL=http://favorites_service:5004
          PAYMENT_URL=http://payment_service:5003
          PROVIDER=none
          GOOGLE_API_KEY=
          GEMINI_MODEL=models/gemini-2.5-flash
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4o-mini
          SOFT_TIMEOUT=8
          HARD_TIMEOUT=15
          CACHE_TTL=600
          STRICT_AI=0
          BANK_NAME=Test Bank
          BANK_ACCOUNT=0000000000
          BANK_OWNER=CI Test
          EOF

      - name: Build and start backend services
        run: docker compose up --build -d

      - name: Wait for backend health checks
        run: |
          wait-on \
            http://localhost:8000/health \
            http://localhost:5001/health \
            http://localhost:5002/ \
            http://localhost:5003/health \
            http://localhost:5004/favorites/ \
            http://localhost:5008/payment/health \
            http://localhost:5009/ \
            http://localhost:5010/search/ \
            http://localhost:5011/ \
            --timeout 180000 \
            --interval 3000

      - name: Show running containers
        run: docker compose ps

      - name: Run Postman API tests with Newman
        run: |
          mkdir -p reports
          newman run postman/postman_collection.json \
            -e postman/postman_environment.json \
            --env-var gatewayUrl=http://localhost:8000 \
            --reporters cli,junit,htmlextra \
            --reporter-junit-export reports/newman-result.xml \
            --reporter-htmlextra-export reports/newman-report.html

      - name: Collect Docker logs when failed
        if: failure()
        run: |
          mkdir -p reports
          docker compose ps > reports/docker-compose-ps.txt
          docker compose logs --no-color > reports/docker-compose.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/

      - name: Create Jira bug when test failed
        if: failure()
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}

      - name: Stop backend services
        if: always()
        run: docker compose down
