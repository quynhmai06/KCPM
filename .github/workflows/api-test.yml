name: API Automation Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      jira_issue_key:
        description: Jira issue key to transition after successful tests, for example KTPM-1
        required: false
        type: string

jobs:
  api-test:
    name: Build backend and run Postman tests
    runs-on: ubuntu-latest
    env:
      AUTH_URL: http://localhost:5001
      JWT_SECRET: supersecret
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      TEST_PASSWORD: "123456"

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API test tools
        run: npm install -g newman newman-reporter-htmlextra wait-on

      - name: Create CI environment file
        run: |
          cat > .env <<EOF
          JWT_SECRET=${JWT_SECRET}
          GATEWAY_SECRET=ci_gateway_secret
          ADMIN_USERNAME=admin
          ADMIN_EMAIL=admin@example.com
          ADMIN_PASSWORD=admin123
          PROVIDER=none
          GOOGLE_API_KEY=
          GEMINI_MODEL=models/gemini-2.5-flash
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4o-mini
          SOFT_TIMEOUT=8
          HARD_TIMEOUT=15
          CACHE_TTL=600
          STRICT_AI=0
          BANK_NAME=Test Bank
          BANK_ACCOUNT=0000000000
          BANK_OWNER=CI Test
          EOF

      - name: Build and start backend services
        run: docker compose up --build -d auth_service payment_service

      - name: Wait for backend health checks
        run: |
          wait-on \
            "$AUTH_URL/health" \
            "http://localhost:5008/health" \
            --timeout 180000 \
            --interval 3000

      - name: Seed auth admin user
        run: docker compose exec -T auth_service python init_db.py

      - name: Show running containers
        run: docker compose ps

      - name: Run auth-service Postman collection with Newman
        id: newman
        run: |
          rm -rf reports
          mkdir -p reports
          collections=(postman/authservice/authservice_postman_collection.json)

          if [ "${#collections[@]}" -eq 0 ]; then
            echo "::error::No Postman service collections were found."
            exit 1
          fi

          test_status=0
          for collection in "${collections[@]}"; do
            collection_file="$(basename "$collection")"
            service_name="${collection_file%_postman_collection.json}"

            echo "::group::Newman - ${service_name}"
            if ! newman run "$collection" \
              -e postman/postman_environment.json \
              -d postman/authservice/data_register.json \
              --env-var auth_url="$AUTH_URL" \
              --env-var adminUsername="$ADMIN_USERNAME" \
              --env-var adminEmail="$ADMIN_EMAIL" \
              --env-var adminPassword="$ADMIN_PASSWORD" \
              --env-var testPassword="$TEST_PASSWORD" \
              --env-var jwtSecret="$JWT_SECRET" \
              --reporters cli,junit,json,htmlextra \
              --reporter-junit-export "reports/${service_name}-newman-result.xml" \
              --reporter-json-export "reports/${service_name}-newman-result.json" \
              --reporter-htmlextra-export "reports/${service_name}-newman-report.html"; then
              test_status=1
            fi
            echo "::endgroup::"
            echo "::group::Newman - paymentservice"
            if ! newman run "postman/paymentservice/paymentservice_postman_collection.json" \
              -e "postman/postman_environment.json" \
              -d "postman/paymentservice/data_payment.service.json" \
              --env-var payment_url="http://localhost:5008" \
              --env-var baseUrl="http://localhost:5008" \
              --reporters cli,junit,json,htmlextra \
              --reporter-junit-export "reports/paymentservice-newman-result.xml" \
              --reporter-json-export "reports/paymentservice-newman-result.json" \
              --reporter-htmlextra-export "reports/paymentservice-newman-report.html"; then
              test_status=1
            fi
            echo "::endgroup::"
          done

          exit "$test_status"

      - name: Collect Docker logs when failed
        if: failure()
        run: |
          mkdir -p reports
          docker compose ps > reports/docker-compose-ps.txt
          docker compose logs --no-color > reports/docker-compose.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/

      - name: Create Jira bug when test failed
        if: failure()
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}
          NEWMAN_SERVICE: paymentservice

      - name: Stop backend services
        if: always()
        run: docker compose down
