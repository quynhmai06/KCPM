name: API Automation Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      jira_issue_key:
        description: Jira issue key to transition after successful tests, for example KTPM-1
        required: false
        type: string

jobs:
  api-test:
    name: Listing Service Update Newman Test
    runs-on: ubuntu-latest
    env:
      LISTING_URL: http://localhost:5002
      JWT_SECRET: supersecret
      UPDATE_OWNER: profile_member_1782966907
      OTHER_MEMBER: blocked_member_001

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API test tools
        run: npm install -g newman newman-reporter-htmlextra wait-on

      - name: Create CI environment file
        run: |
          cat > .env <<EOF
          JWT_SECRET=${JWT_SECRET}
          AUTH_URL=http://127.0.0.1:1
          GATEWAY_SECRET=ci_gateway_secret
          ADMIN_USERNAME=admin
          ADMIN_EMAIL=admin@example.com
          ADMIN_PASSWORD=admin123
          PROVIDER=none
          GOOGLE_API_KEY=
          GEMINI_MODEL=models/gemini-2.5-flash
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4o-mini
          SOFT_TIMEOUT=8
          HARD_TIMEOUT=15
          CACHE_TTL=600
          STRICT_AI=0
          BANK_NAME=Test Bank
          BANK_ACCOUNT=0000000000
          BANK_OWNER=CI Test
          EOF

      - name: Start postgres only
        run: docker compose up -d postgres

      - name: Build and start listing service only
        run: docker compose up --build -d --no-deps listing_service

      - name: Wait for listing health check
        run: wait-on "$LISTING_URL/" --timeout 180000 --interval 3000

      - name: Prepare listing update test data
        run: |
          docker compose exec -T listing_service python - <<'PY'
          from datetime import datetime
          from app import create_app
          from models import db, Product, ProductStatus, ItemType

          owner = "profile_member_1782966907"

          app = create_app()
          with app.app_context():
              db.create_all()

              Product.query.filter(Product.id.in_([1, 2])).delete(synchronize_session=False)

              editable = Product(
                  id=1,
                  name="Editable listing",
                  description="Seed listing for update API tests",
                  price=500000000,
                  brand="VinFast",
                  province="Hà Nội",
                  year=2010,
                  mileage=500000,
                  battery_capacity="82",
                  owner=owner,
                  item_type=ItemType.vehicle,
                  main_image_url="seed.jpg",
                  sub_image_urls="[]",
                  approved=False,
                  status=ProductStatus.pending,
              )

              approved = Product(
                  id=2,
                  name="Approved listing",
                  description="Seed approved listing for update API tests",
                  price=500000000,
                  brand="VinFast",
                  province="Hà Nội",
                  year=2010,
                  mileage=500000,
                  battery_capacity="82",
                  owner=owner,
                  item_type=ItemType.vehicle,
                  main_image_url="approved.jpg",
                  sub_image_urls="[]",
                  approved=True,
                  approved_at=datetime.utcnow(),
                  approved_by="admin",
                  status=ProductStatus.approved,
              )

              db.session.add_all([editable, approved])
              db.session.commit()
          PY

      - name: Create listing update JWT tokens
        run: |
          MEMBER_TOKEN=$(node - <<'NODE'
          const crypto = require('crypto');
          const secret = process.env.JWT_SECRET;
          const payload = {
            sub: '2',
            username: process.env.UPDATE_OWNER,
            role: 'member',
            approved: true,
            locked: false,
            exp: Math.floor(Date.now() / 1000) + 6 * 60 * 60
          };
          const enc = (obj) => Buffer.from(JSON.stringify(obj)).toString('base64url');
          const data = enc({ alg: 'HS256', typ: 'JWT' }) + '.' + enc(payload);
          const sig = crypto.createHmac('sha256', secret).update(data).digest('base64url');
          process.stdout.write(data + '.' + sig);
          NODE
          )

          OTHER_MEMBER_TOKEN=$(node - <<'NODE'
          const crypto = require('crypto');
          const secret = process.env.JWT_SECRET;
          const payload = {
            sub: '99',
            username: process.env.OTHER_MEMBER,
            role: 'member',
            approved: true,
            locked: false,
            exp: Math.floor(Date.now() / 1000) + 6 * 60 * 60
          };
          const enc = (obj) => Buffer.from(JSON.stringify(obj)).toString('base64url');
          const data = enc({ alg: 'HS256', typ: 'JWT' }) + '.' + enc(payload);
          const sig = crypto.createHmac('sha256', secret).update(data).digest('base64url');
          process.stdout.write(data + '.' + sig);
          NODE
          )

          echo "::add-mask::$MEMBER_TOKEN"
          echo "::add-mask::$OTHER_MEMBER_TOKEN"
          echo "MEMBER_TOKEN=$MEMBER_TOKEN" >> "$GITHUB_ENV"
          echo "OTHER_MEMBER_TOKEN=$OTHER_MEMBER_TOKEN" >> "$GITHUB_ENV"

      - name: Show running containers
        run: docker compose ps

      - name: Run listing update Newman collection
        id: newman
        run: |
          rm -rf reports
          mkdir -p reports

          newman run "postman/listingservice/listingservice_postman_collection.json" \
            -e "postman/postman_environment.json" \
            -d "postman/listingservice/data_update.json" \
            --folder "Update" \
            --env-var listing_url="$LISTING_URL" \
            --env-var update_listing_id="1" \
            --env-var approved_listing_id="2" \
            --env-var missing_listing_id="99999999" \
            --env-var memberToken="$MEMBER_TOKEN" \
            --env-var blockedMemberToken="$OTHER_MEMBER_TOKEN" \
            --env-var otherMemberToken="$OTHER_MEMBER_TOKEN" \
            --reporters cli,junit,json,htmlextra \
            --reporter-junit-export "reports/listingservice-update-newman-result.xml" \
            --reporter-json-export "reports/listingservice-update-newman-result.json" \
            --reporter-htmlextra-export "reports/listing-service-update-report.html"

          cp reports/listingservice-update-newman-result.json reports/newman-result.json

      - name: Collect Docker logs when failed
        if: failure()
        run: |
          mkdir -p reports
          docker compose ps > reports/docker-compose-ps.txt
          docker compose logs --no-color > reports/docker-compose.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/

      - name: Create Jira bug when test failed
        if: failure()
        run: bash scripts/create-jira-issue.sh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_SPRINT_ID: ${{ secrets.JIRA_SPRINT_ID }}
          NEWMAN_SERVICE: listingservice-update

      - name: Stop backend services
        if: always()
        run: docker compose down
