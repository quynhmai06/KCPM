# Thong tin project tren SonarQube
sonar.projectKey=payment-service
sonar.projectName=Payment Service
sonar.projectVersion=1.0

# Ma nguon va test
sonar.sources=routes.py,models.py
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Khong phan tich cac thu muc/file khong can thiet
sonar.exclusions=.venv/**,htmlcov/**,.pytest_cache/**,__pycache__/**,migrations/**,tests/**

# Khong tinh coverage tren test
sonar.coverage.exclusions=tests/**

# File coverage do pytest-cov tao
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8