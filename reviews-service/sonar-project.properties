# Thong tin project tren SonarQube
sonar.projectKey=reviews-service
sonar.projectName=Reviews Service
sonar.projectVersion=1.0

# Ma nguon va test
sonar.sources=app.py,db.py,routes.py,models.py
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Khong phan tich file test va file tu sinh nhu source code
sonar.exclusions=tests/**,htmlcov/**,.pytest_cache/**,__pycache__/**,instance/**,static/uploads/**

# Khong tinh coverage tren test
sonar.coverage.exclusions=tests/**

# File coverage do pytest-cov tao
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8